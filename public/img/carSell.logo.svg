<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280" role="img" aria-label="Maneja tus sueños">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A24A"/>
      <stop offset="50%" stop-color="#9A6F1E"/>
      <stop offset="100%" stop-color="#5E4210"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D9B25E"/>
      <stop offset="100%" stop-color="#7E5A1A"/>
    </linearGradient>
  </defs>

  <rect width="600" height="280" fill="#F5F1E8"/>

  <!-- Emblem -->
  <g transform="translate(110,140)">
    <circle r="74" fill="none" stroke="url(#gold)" stroke-width="2.2"/>
    <circle r="66" fill="none" stroke="url(#goldShine)" stroke-width="0.8" opacity="0.7"/>

    <g fill="url(#goldShine)">
      <path d="M-52 14 C -38 -10, -18 -22, -2 -2 L -8 8 C -22 -8, -38 0, -48 18 Z"/>
      <path d="M52 14 C 38 -10, 18 -22, 2 -2 L 8 8 C 22 -8, 38 0, 48 18 Z"/>
      <path d="M-22 26 L -10 -18 L 0 6 L 10 -18 L 22 26 L 14 26 L 8 6 L 0 22 L -8 6 L -14 26 Z"/>
    </g>

    <g stroke="url(#gold)" stroke-linecap="round" fill="none">
      <line x1="-86" y1="-28" x2="-62" y2="-28" stroke-width="1.4" opacity="0.9"/>
      <line x1="-90" y1="-18" x2="-58" y2="-18" stroke-width="1" opacity="0.6"/>
      <line x1="-88" y1="-8"  x2="-66" y2="-8"  stroke-width="0.7" opacity="0.4"/>
      <line x1="86"  y1="-28" x2="62"  y2="-28" stroke-width="1.4" opacity="0.9"/>
      <line x1="90"  y1="-18" x2="58"  y2="-18" stroke-width="1" opacity="0.6"/>
      <line x1="88"  y1="-8"  x2="66"  y2="-8"  stroke-width="0.7" opacity="0.4"/>
    </g>
  </g>

  <line x1="210" y1="92" x2="210" y2="188" stroke="url(#gold)" stroke-width="1"/>

  <g transform="translate(232,0)" font-family="'Trajan Pro','Cormorant Garamond','Times New Roman',serif">
    <text x="0" y="138" fill="url(#goldShine)" font-size="46" letter-spacing="10" font-weight="500">MANEJA</text>
    <line x1="2" y1="152" x2="320" y2="152" stroke="url(#gold)" stroke-width="0.6" opacity="0.7"/>
    <text x="2" y="180" fill="#3A2A0E" font-family="'Helvetica Neue','Inter',sans-serif" font-size="13" letter-spacing="14" font-weight="300">TUS  SUEÑOS</text>
  </g>

  <g font-family="'Helvetica Neue','Inter',sans-serif" fill="#9A6F1E" font-size="9" letter-spacing="4">
    <text x="232" y="100">— PREMIUM AUTOMOBILES —</text>
  </g>
</svg>
